<!doctype html>
<html lang="bn">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var savedTheme = localStorage.getItem("ilmghar-theme");
          if (savedTheme === "light") {
            document.documentElement.setAttribute("data-theme", "ilmghar-light");
          } else if (savedTheme === "dark") {
            document.documentElement.setAttribute("data-theme", "ilmghar-dark");
          }
          var savedLang = localStorage.getItem("ilmghar-lang");
          if (savedLang === "en") {
            document.documentElement.lang = "en";
          }
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Cabin:ital,wght@0,400..700;1,400..700&family=Hind+Siliguri:wght@400;500;600;700&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>ইলমঘর | IlmHouse</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
